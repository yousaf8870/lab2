name: CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Show Python version
        run: python3 --version

      - name: Run Tests
        run: python3 test_calculator.py

      - name: Show system info on success
        run: |
          echo 'Tests completed successfully!'
          echo 'Runner info:'
          uname -a